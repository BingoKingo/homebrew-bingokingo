# Modified from https://github.com/Homebrew/homebrew-core/blob/5b1dd67ee4534183a62f0634b091ff9ea0fc7ad5/.github/workflows/dispatch-build-bottle.yml
name: Test and build bottle

run-name: Brew test and build bottle of ${{ inputs.formula || 'N/A' }} on ${{ inputs.runner || 'N/A' }}

on:
  workflow_dispatch:
    inputs:
      runner:
        description: Build runner(s) (macOS version or Linux)
        required: true
        default: macos-14,macos-15,macos-26,ubuntu-22.04,ubuntu-22.04-arm
      formula:
        description: Formula name
        required: true
        default: ""
      timeout:
        description: "Build timeout (in minutes, default: 60 minutes)"
        type: number
        default: 60
        required: false
      upload:
        description: "Upload built bottles? (default: false)"
        type: boolean
        default: false
        required: false
  # push:
  #   branches:
  #     - main
  #     - test
  #   paths:
  #     - 'Formula/**/*.rb'
  #     - 'Casks/**/*.rb'
  # pull_request:
  #   paths:
  #     - 'Formula/**/*.rb'
  #     - 'Casks/**/*.rb'

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_GITHUB_ACTIONS: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_FROM_API: 1
  HOMEBREW_NO_BUILD_ERROR_ISSUES: 1
  RUN_URL: ${{github.event.repository.html_url}}/actions/runs/${{github.run_id}}
  DISPATCH_BUILD_BOTTLE_SENDER: ${{ github.event.sender.login }}
  DISPATCH_BUILD_BOTTLE_FORMULA: ${{ inputs.formula || '' }}
  DISPATCH_BUILD_BOTTLE_RUNNER: ${{ inputs.runner || 'macos-14,macos-15,macos-26,ubuntu-22.04,ubuntu-22.04-arm' }}
  DISPATCH_BUILD_BOTTLE_TIMEOUT: ${{ inputs.timeout || '60' }}
  DISPATCH_BUILD_BOTTLE_UPLOAD: ${{ inputs.upload }}

defaults:
  run:
    shell: bash -xeuo pipefail {0}

# Intentionally the same as dispatch-rebottle
concurrency: bottle-${{ github.event.inputs.formula }}

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/homebrew/ubuntu22.04:main
    outputs:
      runners: ${{steps.runner-matrix.outputs.result}}
      formula: ${{steps.determine-formula.outputs.formula}}
      formula_list: ${{steps.determine-formula.outputs.formula_list}}
    steps:
      - name: Set Up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: true
          cask: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      # - run: brew test-bot --only-tap-syntax

      - name: Prepare Runner Matrix
        id: runner-matrix
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const macOSRegex = /^(\d+(?:\.\d+)?)(?:-(arm64|x86_64))?$/;
            const linuxRegex = /^(?:ubuntu-|linux-self-hosted-)/;
            const runnerInput = context.payload.inputs?.runner || "macos-14,macos-15,macos-26,ubuntu-22.04,ubuntu-22.04-arm";
            return runnerInput.split(",")
                                                .map(s => s.trim())
                                                .filter(Boolean)
                                                .map(s => {
              const macOSMatch = macOSRegex.exec(s);
              if (macOSMatch && s != "11-arm64") // Ephemeral runners
                return {runner: `${macOSMatch[1]}-${macOSMatch[2] ?? "x86_64"}-${context.runId}-dispatch`, cleanup: false};
              else if (linuxRegex.test(s))
                return {
                  runner:    s,
                  container: {
                    image:   "ghcr.io/homebrew/ubuntu22.04:main",
                    options: "--user=linuxbrew -e GITHUB_ACTIONS_HOMEBREW_SELF_HOSTED"
                  },
                  workdir:   "/github/home",
                  cleanup:   false
                };
              else
                return {runner: s, cleanup: true};
            });

      - name: Determine Formula Name
        id: determine-formula
        run: |
          set +euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            formula_input="${{ inputs.formula }}"
            if [[ -n "$formula_input" ]]; then
              # Convert comma-separated formula list to JSON array
              formula_list=$(echo "$formula_input" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
              formula_json="["
              first=true
              while IFS= read -r formula; do
                if [ "$first" = true ]; then
                  formula_json="$formula_json\"$formula\""
                  first=false
                else
                  formula_json="$formula_json,\"$formula\""
                fi
              done <<< "$formula_list"
              formula_json="$formula_json]"
              echo "formula=$formula_input" >> "$GITHUB_OUTPUT"
              echo "formula_list=$formula_json" >> "$GITHUB_OUTPUT"
            else
              echo "formula=" >> "$GITHUB_OUTPUT"
              echo "formula_list=[]" >> "$GITHUB_OUTPUT"
            fi
          else
            if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              modified_files=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD 2>/dev/null || git ls-files Formula/*.rb 2>/dev/null || echo "")
              formula_files=$(echo "$modified_files" | grep "^Formula/" | grep "\.rb$")
              formula_file=$(echo "$formula_files" | tail -n 1)
              if [[ -n "$formula_file" ]]; then
                formula_name=$(basename "$formula_file" .rb)
                echo "formula=$formula_name" >> "$GITHUB_OUTPUT"
                echo "formula_list=[\"$formula_name\"]" >> "$GITHUB_OUTPUT"
              else
                echo "formula=" >> "$GITHUB_OUTPUT"
                echo "formula_list=[]" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "formula=" >> "$GITHUB_OUTPUT"
              echo "formula_list=[]" >> "$GITHUB_OUTPUT"
            fi
          fi
          set -euo pipefail

      - name: Ensure homebrew/core is Up-to-date
        if: endsWith(github.ref, 'main')
        run: brew update

      - name: Check for Existing Bottle
        if: steps.determine-formula.outputs.formula != ''
        shell: bash -xeuo pipefail {0}
        env:
          HOMEBREW_RUNNER_MATRIX: ${{ steps.runner-matrix.outputs.result }}
          HOMEBREW_DISPATCHED_FORMULA: ${{ steps.determine-formula.outputs.formula }}
        run: |
          IFS=',' read -ra formula_array <<< "${HOMEBREW_DISPATCHED_FORMULA}"
          trimmed_formula_array=()
          for formula in "${formula_array[@]}"; do
            trimmed_formula=$(echo "$formula" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            if [[ -n "$trimmed_formula" ]]; then
              trimmed_formula_array+=("$trimmed_formula")
            fi
          done
          formula_array=("${trimmed_formula_array[@]}")
          for formula_name in "${trimmed_formula_array[@]}"; do
            HOMEBREW_FORMULA_NAME="$formula_name" brew ruby << 'EOF'
              require 'json'
              require 'formulary'
              require 'utils/bottles'

              matrix = JSON.parse(ENV.fetch("HOMEBREW_RUNNER_MATRIX"))
              formula_name = ENV.fetch("HOMEBREW_FORMULA_NAME")

              begin
                formula = Formulary.factory(formula_name)
                matrix.each do |entry|
                  runner = entry.fetch("runner")

                  bottle_tag = if runner.start_with?("ubuntu-") && runner.end_with?("-arm")
                    Utils::Bottles.tag(:arm64_linux)
                  elsif runner.start_with?("ubuntu") || runner.start_with?("linux")
                    Utils::Bottles.tag(:x86_64_linux)
                  elsif runner.match?(/^\d+-/)
                    os_version, arch, _ = *runner.split("-")
                    system = MacOSVersion.new(os_version).to_sym
                    arch = arch.to_sym

                    Utils::Bottles::Tag.new(system: system, arch: arch)
                  end
                  next if bottle_tag.nil?

                  bottled_on_current_runner = formula.bottle_specification.tag?(bottle_tag, no_older_versions: true)
                  next unless bottled_on_current_runner

                  puts "Error: #{formula_name} already has a bottle for #{bottle_tag}!"
                end
              rescue FormulaUnavailableError => e
                puts "Error: Formula #{formula_name} not found: #{e.message}"
              end
          EOF
          done

  bottle:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        formula: ${{fromJson(needs.prepare.outputs.formula_list)}}
        runner: ${{fromJson(needs.prepare.outputs.runners)}}
    runs-on: ${{matrix.runner.runner}}
    container: ${{matrix.runner.container}}
    timeout-minutes: ${{fromJson(github.event.inputs.timeout || '60')}}
    permissions:
      contents: read
    defaults:
      run:
        shell: /bin/bash -xeuo pipefail {0}
        working-directory: ${{matrix.runner.workdir || github.workspace}}
    env:
      GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      HOMEBREW_GITHUB_API_TOKEN: ${{secrets.GITHUB_TOKEN}}
      BOTTLES_DIR: ${{ matrix.runner.workdir || github.workspace }}/bottles_${{ matrix.formula }}_${{ matrix.runner.runner }}
      DISPATCH_BUILD_BOTTLE_FORMULA: ${{ matrix.formula }}
    steps:
      - name: Print Details of ${{ matrix.formula }}
        id: print_details
        run: |
          echo sender="${DISPATCH_BUILD_BOTTLE_SENDER}"
          echo formula="${DISPATCH_BUILD_BOTTLE_FORMULA}"
          echo runner="${DISPATCH_BUILD_BOTTLE_RUNNER}"
          echo timeout="${DISPATCH_BUILD_BOTTLE_TIMEOUT}"
          echo upload="${DISPATCH_BUILD_BOTTLE_UPLOAD}"

      - name: Pre-test Steps
        uses: Homebrew/actions/pre-build@main
        with:
          bottles-directory: ${{ env.BOTTLES_DIR }}
          cleanup: ${{ matrix.runner.cleanup }}

      - name: Build Bottles
        working-directory: ${{ env.BOTTLES_DIR }}
        run: |
          set +e
          brew test-bot \
            --only-formulae \
            --keep-old \
            --only-json-tab \
            --skip-online-checks \
            --skip-dependents \
            --root-url="https://ghcr.io/v2/bingokingo/homebrew" \
            "${DISPATCH_BUILD_BOTTLE_FORMULA}"
          exit 0

      - name: Upload Bottles and Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bottles_${{ matrix.formula }}_${{ matrix.runner.runner }}
          path: ${{ env.BOTTLES_DIR }}
          retention-days: 1

  upload:
    permissions:
      contents: write
      packages: write
      pull-requests: write # for `gh pr edit`
      attestations: write # for actions/attest-build-provenance
      id-token: write # for actions/attest-build-provenance
    runs-on: ubuntu-latest
    needs: [bottle, prepare]
    if: inputs.upload && needs.prepare.outputs.formula != ''
    container:
      image: ghcr.io/homebrew/ubuntu22.04:main
    env:
      HOMEBREW_SIMULATE_MACOS_ON_LINUX: 1
      GH_REPO: ${{github.repository}}
      GH_NO_UPDATE_NOTIFIER: 1
      GH_PROMPT_DISABLED: 1
      BOTTLE_BRANCH: ${{github.actor}}/dispatch/formulae/${{github.run_id}}
      BOTTLES_DIR: ${{ github.workspace }}/bottles
    steps:
      - name: Set Up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: true
          cask: false

      - name: Download Bottles from GitHub Actions
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: bottles_*
          path: ${{ env.BOTTLES_DIR }}
          merge-multiple: false

      - name: Move Bottles and JSON Files to Main Directory
        working-directory: ${{ env.BOTTLES_DIR }}
        run: |
          find . -name "*.tar.gz" -type f -exec mv {} . \;
          find . -name "*.json" -type f -exec mv {} . \;
          find . -type d -empty -delete

      - name: Configure Git User
        id: git-user-config
        uses: Homebrew/actions/git-user-config@main
        with:
          username: ${{ github.actor }}

      # - name: Set Up Commit Signing
      #   uses: Homebrew/actions/setup-commit-signing@main
      #   with:
      #     signing_key: ${{ secrets.SSH_SIGNING_KEY }}

      - name: Generate Build Provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.BOTTLES_DIR }}/*.tar.gz

      - name: Checkout Branch for Bottle Commit
        working-directory: ${{steps.set-up-homebrew.outputs.repository-path}}
        run: git checkout -b "$BOTTLE_BRANCH" origin/${{github.ref_name}}

      - name: Upload Bottles to GitHub Packages # no --keep-old
        id: upload
        env:
          HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.repository_owner }}
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMITTER_NAME_EMAIL: "${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
          HOMEBREW_REPO_PATH: ${{steps.set-up-homebrew.outputs.repository-path}}
        working-directory: ${{ env.BOTTLES_DIR }}
        run: |
          brew pr-upload --verbose --committer="$COMMITTER_NAME_EMAIL" --root-url="https://ghcr.io/v2/bingokingo/homebrew"
          echo "title=$(git -C "$HOMEBREW_REPO_PATH" log -1 --format='%s' "$BOTTLE_BRANCH")" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(git -C "$HOMEBREW_REPO_PATH" rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push Commits
        uses: Homebrew/actions/git-try-push@main
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          directory: ${{steps.set-up-homebrew.outputs.repository-path}}
          branch: ${{env.BOTTLE_BRANCH}}
        env:
          GIT_COMMITTER_NAME: ${{ github.actor }}
          GIT_COMMITTER_EMAIL: ${{ github.actor }}@users.noreply.github.com

      - name: Open PR with Bottle Commit
        id: create-pr
        uses: Homebrew/actions/create-pull-request@main
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          base: ${{github.ref_name}}
          head: ${{env.BOTTLE_BRANCH}}
          title: ${{steps.upload.outputs.title}}
          body: Created by [`brew dispatch-build-bottle`](${{env.RUN_URL}})
          labels: CI-published-bottle-commits
          reviewers: ${{github.actor}}

      # - name: Enable Automerge
